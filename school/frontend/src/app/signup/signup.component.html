<div class="container mt-5">
  <h3>Signup</h3>

  <input [(ngModel)]="user.name" placeholder="Name" class="form-control mb-2">
  <input [(ngModel)]="user.email" placeholder="Email" class="form-control mb-2">
  <input [(ngModel)]="user.password" type="password" placeholder="Password" class="form-control mb-2">

  <select [(ngModel)]="user.role" class="form-control mb-3">
    <option value="admin">Admin</option>
    <option value="teacher">Teacher</option>
    <option value="student">Student</option>
  </select>

  <button class="btn btn-success" (click)="signup()">Signup</button>
</div>
