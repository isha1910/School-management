<div class="background py-1">
  <div class="row">

    <div class="col-sm-2 bg-danger text-end fs-6 fw-bold">
      Upcoming Events :-
    </div>

    <div class="col-sm-10">
      <marquee
        behavior="scroll"
        direction="left"
        scrollamount="15"
        class="notice"
        onmouseover="this.stop();"
        onmouseout="this.start();"
      >
              <a style="text-decoration: none; color:inherit;"  [routerLink]="'/events'">
        <span *ngFor="let event of events" class="me-5">

          <strong class="text-danger">Function:</strong> {{ event.title }}
          &nbsp;&nbsp;

          <strong>Date:</strong> {{ event.date | date:'dd MMMM yyyy' }}
          &nbsp;&nbsp;

          <strong>Location:</strong> {{ event.location }}

        </span>
       </a>
      </marquee>
    </div>

  </div>
</div>
