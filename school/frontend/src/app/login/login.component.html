<div class="container mt-5" style="max-width: 400px;">

  <h3 class="text-center mb-4">Login</h3>

  <!-- Email -->
  <div class="mb-3">
    <input 
      [(ngModel)]="email"
      type="email" 
      class="form-control" 
      placeholder="Enter Email">
  </div>

  <!-- Password -->
  <div class="mb-3">
    <input 
      [(ngModel)]="password"
      type="password" 
      class="form-control" 
      placeholder="Enter Password">
  </div>

  <!-- Button -->
  <button 
    class="btn btn-primary w-100"
    (click)="login()">
    Login
  </button>

</div>
