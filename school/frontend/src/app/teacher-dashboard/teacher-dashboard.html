<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🎓 School</h2>

    <a routerLink="students" routerLinkActive="active">Students</a>
    <a routerLink="attendance" routerLinkActive="active">Attendance</a>
    <a routerLink="assignments" routerLinkActive="active">Assignments</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h3>Teacher Dashboard</h3>
      <div class="profile">👩‍🏫 Teacher</div>
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card blue">
        <h4>Total Students</h4>
        <p>{{totalStudents}}</p>
      </div>

      <div class="card green">
        <h4>Present Today</h4>
        <p>{{presentToday}}</p>
      </div>

      <div class="card purple">
        <h4>Assignments</h4>
        <p>{{assignments}}</p>
      </div>
    </div>

    <!-- CHILD PAGE -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
