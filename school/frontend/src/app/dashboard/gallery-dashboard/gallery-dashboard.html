<div class="card shadow p-3">

<div class="d-flex justify-content-between mb-3">
<h5>Gallery</h5>

<button class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#galleryModal"
(click)="resetForm()">
+ Add Gallery
</button>
</div>

<table class="table table-hover">

<thead class="table-dark">
<tr>
<th>Title</th>
<th>Date</th>
<th>Images</th>
<th class="text-end">Actions</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let g of gallery">
<td>{{g.title}}</td>
<td>{{g.date | date}}</td>

<td>
<img *ngFor="let img of g.images"
[src]="img"
width="60"
height="60"
class="me-1 rounded border"
style="object-fit:cover;"
(onerror)="img.src='https://via.placeholder.com/60'"/>
</td>

<td class="text-end">
<button class="btn btn-warning btn-sm me-2"
(click)="editGallery(g)"
data-bs-toggle="modal"
data-bs-target="#galleryModal">Edit</button>

<button class="btn btn-danger btn-sm"
(click)="deleteGallery(g._id)">Delete</button>
</td>
</tr>

<tr *ngIf="gallery.length==0">
<td colspan="4" class="text-center">No Data</td>
</tr>

</tbody>

</table>

</div>

<!-- MODAL -->
<div class="modal fade" id="galleryModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>{{isEdit ? 'Edit':'Add'}} Gallery</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2"
placeholder="Title"
[(ngModel)]="galleryData.title">

<input class="form-control mb-2"
type="date"
[(ngModel)]="galleryData.date">

<input class="form-control mb-2"
placeholder="Image URLs (comma separated)"
[(ngModel)]="galleryData.images">

</div>

<div class="modal-footer">
<button class="btn btn-primary"
(click)="saveGallery()"
data-bs-dismiss="modal">
{{isEdit ? 'Update':'Save'}}
</button>
</div>

</div>
</div>
</div>
