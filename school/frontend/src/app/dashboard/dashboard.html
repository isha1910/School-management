<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo-section">
  <h2>DASBOARD</h2>
</div>

<ul>

<li (click)="selectedMenu='contact'" [class.active]="selectedMenu=='contact'">
<i class="fa fa-envelope"></i>
<span>Contact</span>
</li>

<li (click)="selectedMenu='events'" [class.active]="selectedMenu=='events'">
<i class="fa fa-calendar"></i>
<span>Events</span>
</li>

<li (click)="selectedMenu='gallery'" [class.active]="selectedMenu=='gallery'">
<i class="fa fa-image"></i>
<span>Gallery</span>
</li>

<li (click)="selectedMenu='notices'" [class.active]="selectedMenu=='notices'">
<i class="fa fa-bullhorn"></i>
<span>Notices</span>
</li>

<li (click)="selectedMenu='teachers'" [class.active]="selectedMenu=='teachers'">
<i class="fa fa-user"></i>
<span>Teachers</span>
</li>

</ul>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">

<h4>Admin Dashboard</h4>

<div class="top-right">

<div class="notification">
<i class="fa fa-bell"></i>
<span class="badge">3</span>
</div>

<div class="admin-section">

<div class="admin" (click)="toggleProfile()">
<i class="fa fa-user-circle"></i>
<span>Admin</span>
<i class="fa fa-angle-down"></i>
</div>

<div class="dropdown" *ngIf="showProfile">
<a routerLink="/">View Website</a>
<a (click)="logout()">Logout</a>
</div>

</div>

</div>

</div>

<!-- CONTENT -->
<div class="content">

@switch (selectedMenu) {

@case ('contact') {
<app-contact-dashboard></app-contact-dashboard>
}

@case ('events') {
<app-events-dashboard></app-events-dashboard>
}

@case ('gallery') {
<app-gallery-dashboard></app-gallery-dashboard>
}

@case ('notices') {
<app-notice-dashboard></app-notice-dashboard>
}

@case ('teachers') {
<app-teachers-dashboard></app-teachers-dashboard>
}

}

</div>

</div>

</div>
