<div class="container-fluid my-5">
  <div class="row justify-content-center">
    <div class="col-md-12 col-lg-10">

      <div class="card shadow rounded-4">

        <div class="card-header background text-white text-center rounded-top-4">
          <h4 class="mb-0">
            <i class="fa fa-envelope me-2"></i>Contact Us
          </h4>
        </div>

        <div class="card-body p-4">

          <form (ngSubmit)="submitForm()">

            <div class="mb-3">
              <label class="form-label">
                <i class="fa fa-user me-1"></i>Name
              </label>

              <input
                type="text"
                class="form-control"
                [(ngModel)]="formData.name"
                name="name"
                required
              >
            </div>


            <div class="mb-3">
              <label class="form-label">
                <i class="fa fa-envelope me-1"></i>Email
              </label>

              <input
                type="email"
                class="form-control"
                [(ngModel)]="formData.email"
                name="email"
                required
              >
            </div>


            <div class="mb-3">
              <label class="form-label">
                <i class="fa fa-phone me-1"></i>Phone
              </label>

              <input
                type="tel"
                class="form-control"
                [(ngModel)]="formData.phone"
                name="phone"
                required
              >
            </div>


            <div class="mb-3">
              <label class="form-label">
                <i class="fa fa-book me-1"></i>Subject
              </label>

              <input
                type="text"
                class="form-control"
                [(ngModel)]="formData.subject"
                name="subject"
                required
              >
            </div>


            <div class="mb-3">
              <label class="form-label">
                <i class="fa fa-comment me-1"></i>Message
              </label>

              <textarea
                class="form-control"
                rows="4"
                [(ngModel)]="formData.message"
                name="message"
                required
              ></textarea>
            </div>


            <div class="d-grid">

              <button
                type="submit"
                class="btn background btn-lg rounded-pill"
              >
                <i class="fa fa-paper-plane me-2"></i>Send Message
              </button>

            </div>

          </form>

        </div>

      </div>

    </div>
  </div>
</div>
